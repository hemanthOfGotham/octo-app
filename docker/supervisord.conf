[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:fastapi]
command=python -m uvicorn apps.backend.fastapi.main:app --host 127.0.0.1 --port %(ENV_FASTAPI_PORT)s
directory=/app
user=nao
environment=HOME="/home/nao"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:backend]
command=/bin/bash -c "exec bun run apps/backend/src/cli.ts serve --port ${SERVER_PORT:-5005}"
directory=/app
user=nao
environment=HOME="/home/nao"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Back office — nao cloud only. The wrapper exits immediately (status 0) in any
# other mode so the admin app never starts in self-hosted/local deployments.
[program:admin]
command=/bin/bash -c "if [ \"$NAO_MODE\" = \"cloud\" ]; then exec bun run apps/admin/src/index.ts; else echo '[admin] disabled (NAO_MODE != cloud)'; fi"
directory=/app
user=nao
environment=HOME="/home/nao"
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
